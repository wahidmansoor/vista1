[build]
  command = "node netlify-build.js"
  publish = "dist"

[build.environment]
  # Node.js configuration
  NODE_VERSION = "20"
  NPM_FLAGS = "--prefer-offline --no-audit --progress=false"
  # Increase Node.js memory limit for builds
  NODE_OPTIONS = "--max-old-space-size=4096"
  
  # Set default environment variables for build
  VITE_GEMINI_API_KEY = "build_default"
  VITE_SUPABASE_URL = "https://build-default.supabase.co"
  VITE_SUPABASE_ANON_KEY = "build_default_key"
  VITE_OPENAI_API_KEY = "build_default"
  VITE_AUTH0_DOMAIN = "build-default.auth0.com"
  VITE_AUTH0_CLIENT_ID = "build_default_client"
  VITE_AUTH0_AUDIENCE = "build_default_audience"
  VITE_AUTH0_CALLBACK_URL = "https://your-app.netlify.app/callback"
  VITE_AUTH0_REDIRECT_URI = "https://your-app.netlify.app/callback"
  
  # Enhanced secrets scanning configuration
  SECRETS_SCAN_ENABLED = "true"
  # Allow legitimate environment variable names
  SECRETS_SCAN_OMIT_KEYS = "VITE_AUTH0_DOMAIN,VITE_AUTH0_CLIENT_ID,VITE_SUPABASE_URL,VITE_SUPABASE_ANON_KEY,VITE_AUTH0_AUDIENCE,VITE_AUTH0_CALLBACK_URL,VITE_AUTH0_REDIRECT_URI,AUTH0_DOMAIN,AUTH0_CLIENT_ID,SUPABASE_URL,SUPABASE_ANON_KEY,ALLOWED_ORIGINS"
  # Exclude build output and documentation from scanning
  SECRETS_SCAN_OMIT_PATHS = "dist/**,build/**,node_modules/**,src/**/*.js,src/**/*.ts,*.md,docs/**,archive/**,public/**,netlify/functions/**,*.example,*.template,.env.example,.env.template,bug-report.md,NETLIFY_SETUP.md,AUTH0_IMPLEMENTATION.md,DEPLOYMENT_FIX.md"

[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = """
      default-src 'self';
      script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.auth0.com https://cdn.lrkt-in.com;
      style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://rsms.me;
      img-src 'self' data: https:;
      font-src 'self' data: https://fonts.gstatic.com https://rsms.me;
      connect-src 'self' https://api.openai.com https://generativelanguage.googleapis.com https://*.supabase.co https://*.auth0.com https://cdn.auth0.com;
      frame-ancestors 'none';
      manifest-src 'self';
    """
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Referrer-Policy = "same-origin"
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200