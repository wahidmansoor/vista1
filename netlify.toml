# Netlify configuration for OncoVista React/TypeScript SPA

[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20.11.0"
  NPM_FLAGS = "--prefer-offline --no-audit --no-fund"
  COREPACK_ENABLE_STRICT = "0"
  GENERATE_SOURCEMAP = "false"

  # Secrets scanning: allow non-sensitive public keys and omit generated files
  SECRETS_SCAN_OMIT_KEYS = "VITE_AUTH0_CLIENT_ID,VITE_AUTH0_DOMAIN,VITE_SUPABASE_ANON_KEY,AUTH0_CLIENT_ID,AUTH0_DOMAIN"
  SECRETS_SCAN_OMIT_PATHS = "dist/**,public/_headers"

[build.processing]
  skip_processing = false

[build.processing.css]
  bundle = true
  minify = true

[build.processing.js]
  bundle = true
  minify = true

[build.processing.html]
  pretty_urls = true

[build.processing.images]
  compress = true

# SPA fallback routing for React Router
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Security headers (global)
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "same-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

    Content-Security-Policy = '''
      default-src 'self';
      script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.auth0.com;
      style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://rsms.me;
      img-src 'self' data: https:;
      font-src 'self' data: https://fonts.gstatic.com https://rsms.me;
      connect-src 'self'
        https://api.openai.com
        https://generativelanguage.googleapis.com
        https://*.supabase.co
        https://mwoncovista.us.auth0.com
        https://cdn.auth0.com;
      frame-ancestors 'none';
      manifest-src 'self';
    '''

# Cache assets for 1 year (immutable)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
    Access-Control-Allow-Origin = "*"

# Cache HTML moderately
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=300, must-revalidate"

# Service worker (if added)
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# API endpoints (no caching)
[[headers]]
  for = "/api/*"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# Fonts caching
[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
    Access-Control-Allow-Origin = "*"

# Favicon + Manifest
[[headers]]
  for = "/favicon.ico"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "public, max-age=86400"
    Content-Type = "application/json"

# Environment for main production deploy
[context.production.environment]
  NODE_ENV = "development"
  GENERATE_SOURCEMAP = "false"
  VITE_AUTH0_REDIRECT_URI = "https://mwoncovista.com/callback"

# Deploy previews (PRs)
[context.deploy-preview.environment]
  NODE_ENV = "production"
  GENERATE_SOURCEMAP = "true"
  VITE_AUTH0_REDIRECT_URI = "https://deploy-preview-${REVIEW_ID}--mwoncovista.com/callback"

# Branch deploys (non-main)
[context.branch-deploy.environment]
  NODE_ENV = "development"
  GENERATE_SOURCEMAP = "true"
  VITE_AUTH0_REDIRECT_URI = "https://${BRANCH}--mwoncovista.com/callback"
