# Netlify configuration for OncoVista React/TypeScript SPA

[build]
  command = "npm ci --include=dev && npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20.11.0"
  NPM_FLAGS = "--prefer-offline --no-audit --no-fund"
  COREPACK_ENABLE_STRICT = "0"
  GENERATE_SOURCEMAP = "false"

  # Secret scanning exclusions
  SECRETS_SCAN_OMIT_PATHS = "dist/**,src/**/*.js,src/**/*.ts,.env,public/_headers"
  SECRETS_SCAN_OMIT_KEYS = "VITE_SUPABASE_ANON_KEY,VITE_AUTH0_CLIENT_ID,VITE_AUTH0_DOMAIN,AUTH0_DOMAIN,AUTH0_CLIENT_ID"

[build.processing]
  skip_processing = false

[build.processing.css]
  bundle = true
  minify = true

[build.processing.js]
  bundle = true
  minify = true

[build.processing.html]
  pretty_urls = true

[build.processing.images]
  compress = true

# SPA fallback routing
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Global Security Headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "same-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy = '''
      default-src 'self';
      script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.auth0.com;
      style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://rsms.me;
      img-src 'self' data: https:;
      font-src 'self' data: https://fonts.gstatic.com https://rsms.me;
      connect-src 'self'
        https://api.openai.com
        https://generativelanguage.googleapis.com
        https://*.supabase.co
        https://mvoncovista.us.auth0.com
        https://cdn.auth0.com;
    '''

# Asset Caching
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
    Access-Control-Allow-Origin = "*"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=300, must-revalidate"

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/api/*"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
    Access-Control-Allow-Origin = "*"

[[headers]]
  for = "/favicon.ico"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "public, max-age=86400"
    Content-Type = "application/json"

# Context: Production (main branch)
[context.production.environment]
  NODE_ENV = "production"
  GENERATE_SOURCEMAP = "false"
  VITE_AUTH0_REDIRECT_URI = "https://mvoncovista.com/callback"

# Context: Deploy Preview (PRs)
[context.deploy-preview.environment]
  NODE_ENV = "production"
  GENERATE_SOURCEMAP = "true"
  VITE_AUTH0_REDIRECT_URI = "https://deploy-preview-${REVIEW_ID}--mvoncovista.com/callback"

# Context: Branch Deploys (non-main)
[context.branch-deploy.environment]
  NODE_ENV = "development"
  GENERATE_SOURCEMAP = "true"
  VITE_AUTH0_REDIRECT_URI = "https://${BRANCH}--mvoncovista.com/callback"
